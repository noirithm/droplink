<!doctype html>
<html>
  <head>
    <title>DropLink</title>
  </head>
  <body>
    <h1>DropLink</h1>

    <div id="sender-section">
      <button onclick="createRoom()">Create Room</button>
      <p>Code: <strong id="room-code">—</strong></p>
      <p>Status: <span id="sender-status">idle</span></p>
      <input
        type="file"
        id="file-input"
        style="display: none"
        onchange="sendFile()"
      />
      <button
        id="send-btn"
        onclick="document.getElementById('file-input').click()"
        disabled
      >
        Send File
      </button>
      <div id="send-progress"></div>
    </div>

    <hr />

    <div id="receiver-section">
      <input id="code-input" placeholder="Enter code" />
      <button onclick="joinRoom()">Join</button>
      <p>Status: <span id="receiver-status">idle</span></p>
      <div id="receive-progress"></div>
    </div>

    <div id="log" style="margin-top: 20px; font-family: monospace"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:3000");

      let peer = null;
      let dataChannel = null;
      let currentCode = null;

      // File receiving state
      let receivingMeta = null;
      let receivedChunks = [];
      let receivedSize = 0;

      const CHUNK_SIZE = 16384; // 16KB
      const MAX_FILE_SIZE = 500 * 1024 * 1024; // 500MB limit

      const STUN = {
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
      };

      function log(msg) {
        document.getElementById("log").innerHTML += `<p>> ${msg}</p>`;
      }

      function createPeer(isSender) {
        peer = new RTCPeerConnection(STUN);

        peer.onicecandidate = (e) => {
          if (e.candidate) {
            socket.emit("ice-candidate", {
              code: currentCode,
              candidate: e.candidate,
            });
          }
        };

        peer.onconnectionstatechange = () => {
          log(`connection state: ${peer.connectionState}`);
          if (peer.connectionState === "failed") {
            handleError("Connection failed. Try again.");
          }
        };

        if (isSender) {
          dataChannel = peer.createDataChannel("droplink");
          setupDataChannel(dataChannel, true);
        } else {
          peer.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel(dataChannel, false);
          };
        }
      }

      function setupDataChannel(channel, isSender) {
        channel.binaryType = "arraybuffer";

        channel.onopen = () => {
          log("data channel open!");
          if (isSender) {
            document.getElementById("send-btn").disabled = false;
            document.getElementById("sender-status").textContent =
              "ready to send";
          } else {
            document.getElementById("receiver-status").textContent =
              "ready to receive";
          }
        };

        channel.onclose = () => log("data channel closed");

        channel.onerror = (e) =>
          handleError("Data channel error: " + e.message);

        channel.onmessage = (e) => {
          // First message is always metadata (string)
          if (typeof e.data === "string") {
            receivingMeta = JSON.parse(e.data);
            receivedChunks = [];
            receivedSize = 0;
            log(
              `receiving: ${receivingMeta.name} (${formatSize(receivingMeta.size)})`,
            );
            document.getElementById("receiver-status").textContent =
              "receiving...";
            return;
          }

          // Rest are binary chunks
          receivedChunks.push(e.data);
          receivedSize += e.data.byteLength;

          // Show receive progress
          const pct = Math.round((receivedSize / receivingMeta.size) * 100);
          document.getElementById("receive-progress").textContent =
            `Receiving: ${pct}%`;

          // All chunks received
          if (receivedSize >= receivingMeta.size) {
            const blob = new Blob(receivedChunks, { type: receivingMeta.type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = receivingMeta.name;
            a.click();
            URL.revokeObjectURL(url);

            document.getElementById("receive-progress").textContent = "Done!";
            document.getElementById("receiver-status").textContent =
              "file received!";
            log(`done! received ${receivingMeta.name}`);

            // Reset
            receivingMeta = null;
            receivedChunks = [];
            receivedSize = 0;
          }
        };
      }

      async function sendFile() {
        const file = document.getElementById("file-input").files[0];
        if (!file) return;

        // File size check
        if (file.size > MAX_FILE_SIZE) {
          handleError("File too large. Max 500MB.");
          return;
        }

        log(`sending: ${file.name} (${formatSize(file.size)})`);
        document.getElementById("sender-status").textContent = "sending...";
        document.getElementById("send-btn").disabled = true;

        // Send metadata first
        const meta = { name: file.name, size: file.size, type: file.type };
        dataChannel.send(JSON.stringify(meta));

        // Read file and send chunks
        const buffer = await file.arrayBuffer();
        let offset = 0;

        function sendNextChunk() {
          if (offset >= buffer.byteLength) {
            document.getElementById("send-progress").textContent = "Done!";
            document.getElementById("sender-status").textContent = "file sent!";
            document.getElementById("send-btn").disabled = false;
            log("file sent successfully");
            return;
          }

          // Wait if buffer is full
          if (dataChannel.bufferedAmount > CHUNK_SIZE * 8) {
            setTimeout(sendNextChunk, 50);
            return;
          }

          const chunk = buffer.slice(offset, offset + CHUNK_SIZE);
          dataChannel.send(chunk);
          offset += CHUNK_SIZE;

          const pct = Math.round((offset / buffer.byteLength) * 100);
          document.getElementById("send-progress").textContent =
            `Sending: ${Math.min(pct, 100)}%`;

          setTimeout(sendNextChunk, 0);
        }

        sendNextChunk();
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function handleError(msg) {
        log("ERROR: " + msg);
        alert(msg);
      }

      function createRoom() {
        socket.emit("create-room");
      }

      function joinRoom() {
        const code = document.getElementById("code-input").value.trim();
        if (!code || code.length !== 6) {
          handleError("Enter a valid 6 digit code");
          return;
        }
        currentCode = code;
        socket.emit("join-room", code);
      }

      socket.on("room-created", (code) => {
        currentCode = code;
        document.getElementById("room-code").textContent = code;
        document.getElementById("sender-status").textContent =
          "waiting for peer...";
      });

      socket.on("room-joined", (code) => {
        document.getElementById("receiver-status").textContent =
          `joined room ${code}`;
        createPeer(false);
      });

      socket.on("peer-joined", async () => {
        document.getElementById("sender-status").textContent =
          "peer found, connecting...";
        createPeer(true);
        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        socket.emit("offer", { code: currentCode, offer });
      });

      socket.on("offer", async (offer) => {
        await peer.setRemoteDescription(offer);
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        socket.emit("answer", { code: currentCode, answer });
      });

      socket.on("answer", async (answer) => {
        await peer.setRemoteDescription(answer);
      });

      socket.on("ice-candidate", async (candidate) => {
        await peer.addIceCandidate(candidate);
      });

      socket.on("peer-disconnected", () => {
        log("peer disconnected");
        document.getElementById("sender-status").textContent =
          "peer disconnected";
        document.getElementById("send-btn").disabled = true;
      });

      socket.on("error", (msg) => handleError(msg));
    </script>
  </body>
</html>
